<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shapes Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #334155;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header .logo { font-size: 2rem; }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #f1f5f9; }
    header p  { font-size: 0.85rem; color: #94a3b8; margin-top: 2px; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      padding: 1.2rem 2rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 0.8rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      min-width: 160px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: #6366f1; }
    .stat-icon { font-size: 1.4rem; }
    .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.3rem; font-weight: 700; color: #a5b4fc; }

    /* ── Layout ── */
    .main { display: flex; gap: 0; min-height: calc(100vh - 120px); }

    /* ── Sidebar ── */
    .sidebar {
      width: 340px;
      flex-shrink: 0;
      background: #1e293b;
      border-right: 1px solid #334155;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .sidebar h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    /* ── Form ── */
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.85rem; color: #cbd5e1; }
    .form-group select,
    .form-group input {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 0.55rem 0.8rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group select:focus,
    .form-group input:focus { border-color: #6366f1; }
    .form-group input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-danger:hover  { opacity: 0.85; }
    .btn-warning { background: #d97706; color: #fff; }
    .btn-warning:hover { opacity: 0.85; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }

    .divider {
      border: none;
      border-top: 1px solid #334155;
    }

    /* ── Content ── */
    .content { flex: 1; padding: 1.5rem 2rem; overflow-y: auto; }
    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .content-header h2 { font-size: 1.2rem; font-weight: 600; }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .tab {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover   { border-color: #6366f1; color: #a5b4fc; }
    .tab.active  { background: #6366f1; border-color: #6366f1; color: #fff; font-weight: 600; }

    /* ── Shape grid ── */
    .shapes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .shape-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }
    .shape-card:hover { border-color: #6366f1; transform: translateY(-2px); }

    .shape-id {
      position: absolute;
      top: 0.6rem; right: 0.8rem;
      font-size: 0.7rem;
      color: #475569;
    }

    .shape-visual {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shape-visual svg { overflow: visible; }

    .shape-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      text-transform: capitalize;
    }
    .shape-dims {
      font-size: 0.78rem;
      color: #64748b;
      text-align: center;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }
    .card-actions button {
      flex: 1;
      padding: 0.4rem;
      border: none;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .card-actions .edit-btn { background: #1d4ed8; color: #fff; }
    .card-actions .edit-btn:hover { opacity: 0.85; }
    .card-actions .del-btn  { background: #7f1d1d; color: #fca5a5; }
    .card-actions .del-btn:hover  { background: #dc2626; color: #fff; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: #475569;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.7rem; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: #22c55e;
      color: #fff;
      padding: 0.75rem 1.2rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transform: translateY(100px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: #dc2626; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 900;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      width: 360px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .modal h3 { font-size: 1.1rem; font-weight: 700; }
    .modal-actions { display: flex; gap: 0.7rem; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .main { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #334155; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⬡</div>
  <div>
    <h1>Shapes Manager</h1>
    <p>Create, view, and manage geometric shapes</p>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card" onclick="loadShapes()">
    <span class="stat-icon">📐</span>
    <div>
      <div class="stat-label">Total Shapes</div>
      <div class="stat-value" id="stat-count">—</div>
    </div>
  </div>
  <div class="stat-card" onclick="loadShapes()">
    <span class="stat-icon">📏</span>
    <div>
      <div class="stat-label">Total Area</div>
      <div class="stat-value" id="stat-area">—</div>
    </div>
  </div>
</div>

<div class="main">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <!-- Create -->
    <div>
      <h2>Add Shape</h2>
      <div style="display:flex;flex-direction:column;gap:0.8rem;">
        <div class="form-group">
          <label>Type</label>
          <select id="create-type" onchange="toggleWidthField()">
            <option value="circle">Circle</option>
            <option value="square">Square</option>
            <option value="rectangle">Rectangle</option>
          </select>
        </div>
        <div class="form-group">
          <label id="len-label">Radius</label>
          <input type="number" id="create-len" placeholder="e.g. 5" min="1" />
        </div>
        <div class="form-group" id="width-group" style="display:none;">
          <label>Width</label>
          <input type="number" id="create-width" placeholder="e.g. 3" min="1" />
        </div>
        <button class="btn btn-primary" onclick="createShape()">＋ Create Shape</button>
      </div>
    </div>

    <hr class="divider" />

    <!-- Delete by ID -->
    <div>
      <h2>Delete by ID</h2>
      <div style="display:flex;gap:0.5rem;">
        <input type="number" id="del-id" placeholder="Shape ID" min="1"
               style="background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:0.55rem 0.8rem;font-size:0.9rem;outline:none;flex:1;"
               onkeydown="if(event.key==='Enter') deleteShape()" />
        <button class="btn btn-danger" style="width:auto;padding:0.55rem 1rem;" onclick="deleteById()">Delete</button>
      </div>
    </div>

    <hr class="divider" />

    <!-- Get by ID -->
    <div>
      <h2>Find by ID</h2>
      <div style="display:flex;gap:0.5rem;">
        <input type="number" id="find-id" placeholder="Shape ID" min="1"
               style="background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:0.55rem 0.8rem;font-size:0.9rem;outline:none;flex:1;"
               onkeydown="if(event.key==='Enter') findById()" />
        <button class="btn btn-secondary" style="width:auto;padding:0.55rem 1rem;" onclick="findById()">Find</button>
      </div>
      <div id="find-result" style="margin-top:0.7rem;font-size:0.82rem;color:#94a3b8;"></div>
    </div>
  </aside>

  <!-- ── Content ── -->
  <main class="content">
    <div class="content-header">
      <h2>All Shapes</h2>
      <div class="filter-tabs">
        <span class="tab active" onclick="setFilter('all', this)">All</span>
        <span class="tab" onclick="setFilter('circle', this)">Circles</span>
        <span class="tab" onclick="setFilter('square', this)">Squares</span>
        <span class="tab" onclick="setFilter('rectangle', this)">Rectangles</span>
      </div>
    </div>
    <div class="shapes-grid" id="shapes-grid">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <div>Loading shapes…</div>
      </div>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Shape <span id="edit-modal-id" style="color:#6366f1;"></span></h3>
    <div class="form-group">
      <label id="edit-len-label">Length / Radius</label>
      <input type="number" id="edit-len" min="1" placeholder="e.g. 5" />
    </div>
    <div class="form-group" id="edit-width-group">
      <label>Width</label>
      <input type="number" id="edit-width" min="1" placeholder="e.g. 3" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="submitEdit()">Save</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = 'http://localhost:8000';
  let allShapes = [];
  let activeFilter = 'all';
  let editingId = null;
  let editingType = null;

  /* ── Boot ── */
  async function init() {
    await Promise.all([loadShapes(), loadStats()]);
  }

  /* ── Data loading ── */
  async function loadShapes() {
    try {
      const res = await fetch(`${API}/shapes/`);
      const data = await res.json();
      // API returns { message: { "3": {shape type, length/radius, ...}, ... } }
      const raw = data.message || {};
      allShapes = Object.entries(raw).map(([id, s]) => ({
        id: parseInt(id),
        type: s['shape type'],
        len: s['length'] ?? s['radius'],
        width: s['width'] ?? null,
      }));
      renderShapes();
      await loadStats();
    } catch (e) {
      toast('Could not reach server', true);
    }
  }

  async function loadStats() {
    try {
      const [countRes, areaRes] = await Promise.all([
        fetch(`${API}/shapes/count`),
        fetch(`${API}/shapes/total-area`)
      ]);
      const countData = await countRes.json();
      const areaData  = await areaRes.json();

      const countMatch = String(countData.message).match(/\d+/);
      document.getElementById('stat-count').textContent = countMatch ? countMatch[0] : '?';

      const area = parseFloat(areaData.message);
      document.getElementById('stat-area').textContent = isNaN(area) ? '?' : area.toFixed(2);
    } catch (e) { /* silent */ }
  }

  /* ── Render ── */
  function renderShapes() {
    const grid = document.getElementById('shapes-grid');
    const shapes = activeFilter === 'all'
      ? allShapes
      : allShapes.filter(s => s.type === activeFilter);

    if (!shapes.length) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>No shapes found</div></div>`;
      return;
    }

    grid.innerHTML = shapes.map(s => `
      <div class="shape-card">
        <span class="shape-id">#${s.id}</span>
        <div class="shape-visual">${shapesvg(s)}</div>
        <div class="shape-name">${s.type}</div>
        <div class="shape-dims">${dimText(s)}</div>
        <div class="card-actions">
          <button class="edit-btn" onclick="openEditModal(${s.id},'${s.type}',${s.len},${s.width ?? 'null'})">✏ Edit</button>
          <button class="del-btn"  onclick="deleteShape(${s.id})">✕ Delete</button>
        </div>
      </div>
    `).join('');
  }

  function dimText(s) {
    if (s.type === 'circle')    return `r = ${s.len}`;
    if (s.type === 'square')    return `side = ${s.len}`;
    if (s.type === 'rectangle') return `${s.len} × ${s.width}`;
    return '';
  }

  /* ── SVG thumbnails ── */
  const COLORS = { circle: '#818cf8', square: '#34d399', rectangle: '#f472b6' };
  function shapesvg(s) {
    const c = COLORS[s.type] || '#94a3b8';
    if (s.type === 'circle') return `
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="26" fill="${c}22" stroke="${c}" stroke-width="2.5"/>
      </svg>`;
    if (s.type === 'square') return `
      <svg width="60" height="60" viewBox="0 0 60 60">
        <rect x="8" y="8" width="44" height="44" rx="4" fill="${c}22" stroke="${c}" stroke-width="2.5"/>
      </svg>`;
    if (s.type === 'rectangle') return `
      <svg width="70" height="50" viewBox="0 0 70 50">
        <rect x="4" y="8" width="62" height="34" rx="4" fill="${c}22" stroke="${c}" stroke-width="2.5"/>
      </svg>`;
    return '';
  }

  /* ── Filter ── */
  function setFilter(type, el) {
    activeFilter = type;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderShapes();
  }

  /* ── Create ── */
  function toggleWidthField() {
    const type = document.getElementById('create-type').value;
    const lbl  = document.getElementById('len-label');
    const wg   = document.getElementById('width-group');
    lbl.textContent = type === 'circle' ? 'Radius' : 'Length';
    wg.style.display = type === 'rectangle' ? 'flex' : 'none';
  }

  async function createShape() {
    const type = document.getElementById('create-type').value;
    const len  = parseInt(document.getElementById('create-len').value);
    const width = parseInt(document.getElementById('create-width').value) || null;

    if (!len || len < 1) { toast('Enter a valid length / radius', true); return; }
    if (type === 'rectangle' && (!width || width < 1)) { toast('Enter a valid width', true); return; }

    const body = { shape_type: type, length_radius: len };
    if (type === 'rectangle') body.width = width;

    try {
      const res = await fetch(`${API}/shapes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json();
        toast(err.detail || 'Error creating shape', true);
        return;
      }
      const data = await res.json();
      toast(`Shape created! (ID ${data['shape id']})`);
      document.getElementById('create-len').value = '';
      document.getElementById('create-width').value = '';
      await loadShapes();
    } catch (e) { toast('Network error', true); }
  }

  /* ── Delete ── */
  async function deleteShape(id) {
    try {
      const res = await fetch(`${API}/shapes/${id}`, { method: 'DELETE' });
      if (!res.ok) {
        const err = await res.json();
        toast(err.detail || `Could not delete #${id}`, true);
        return;
      }
      toast(`Shape #${id} deleted`);
      await loadShapes();
    } catch (e) { toast('Network error', true); }
  }

  async function deleteById() {
    const id = parseInt(document.getElementById('del-id').value);
    if (!id) { toast('Enter a shape ID', true); return; }
    document.getElementById('del-id').value = '';
    await deleteShape(id);
  }

  /* ── Find by ID ── */
  async function findById() {
    const id = parseInt(document.getElementById('find-id').value);
    if (!id) { toast('Enter a shape ID', true); return; }
    const box = document.getElementById('find-result');
    try {
      const res = await fetch(`${API}/shapes/${id}`);
      if (!res.ok) { box.textContent = `No shape with ID ${id}`; return; }
      const data = await res.json();
      const raw = data.message;
      const s = {
        id,
        type: raw['shape type'],
        len: raw['length'] ?? raw['radius'],
        width: raw['width'] ?? null,
      };
      box.innerHTML = `<strong style="color:#a5b4fc">#${s.id}</strong> — ${s.type}, ${dimText(s)}`;
    } catch (e) { box.textContent = 'Error fetching shape'; }
  }

  /* ── Edit Modal ── */
  function openEditModal(id, type, len, width) {
    editingId   = id;
    editingType = type;
    document.getElementById('edit-modal-id').textContent = `#${id} (${type})`;
    document.getElementById('edit-len-label').textContent = type === 'circle' ? 'Radius' : 'Length';
    document.getElementById('edit-len').value   = len;
    document.getElementById('edit-width').value = width ?? '';
    document.getElementById('edit-width-group').style.display = type === 'rectangle' ? 'flex' : 'none';
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = editingType = null;
  }

  async function submitEdit() {
    const len   = parseInt(document.getElementById('edit-len').value);
    const width = parseInt(document.getElementById('edit-width').value) || null;
    if (!len || len < 1) { toast('Enter a valid value', true); return; }

    const body = { length_or_radius: len };
    if (editingType === 'rectangle') body.width = width;

    try {
      const res = await fetch(`${API}/shapes/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json();
        toast(err.detail || 'Update failed', true); return;
      }
      toast(`Shape #${editingId} updated`);
      closeEditModal();
      await loadShapes();
    } catch (e) { toast('Network error', true); }
  }

  /* ── Toast ── */
  let toastTimer;
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  /* ── Modal close on overlay click ── */
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  /* ── Kick off ── */
  toggleWidthField();
  init();
</script>
</body>
</html>
